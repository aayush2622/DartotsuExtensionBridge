[versions]
coroutines = "1.10.2"
serialization = "1.9.0"
okhttp = "5.0.0-alpha.14"
okio = "3.16.4"
rxjava = "1.3.8"
gson = "2.13.2"
jsoup = "1.22.1"

[libraries]

# Coroutines
coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }

# Serialization
serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }
serialization-json-okio = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json-okio", version.ref = "serialization" }
serialization-protobuf = { module = "org.jetbrains.kotlinx:kotlinx-serialization-protobuf", version.ref = "serialization" }

# OkHttp + Okio
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
okhttp-logging = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp" }
okhttp-doh = { module = "com.squareup.okhttp3:okhttp-dnsoverhttps", version.ref = "okhttp" }
okhttp-brotli = { module = "com.squareup.okhttp3:okhttp-brotli", version.ref = "okhttp" }

okio = { module = "com.squareup.okio:okio", version.ref = "okio" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
# RxJava
rxjava = { module = "io.reactivex:rxjava", version.ref = "rxjava" }

# Jsoup
jsoup = { module = "org.jsoup:jsoup", version.ref = "jsoup" }